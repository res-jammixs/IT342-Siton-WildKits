spring:
  application:
    name: wildkits

  datasource:
    url: ${SUPABASE_DB_URL:}
    username: ${SUPABASE_DB_USER:}
    password: ${SUPABASE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.wildkits: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:wildkits_super_secret_key_change_in_production_2024_very_long_key_for_security_at_least_512_bits_required}
  expiration: 86400000 # 24 hours in milliseconds

# Supabase Storage Configuration
# IMPORTANT: You must create the storage bucket for registration to work!
# 
# Next Steps:
#   1. Go to Supabase Dashboard > Storage
#   2. Create a new bucket named "student-id-images" (set as Private)
#   3. Set RLS policies (see REGISTRATION_ERROR_FIX.md for SQL)
#
supabase:
  url: ${SUPABASE_URL:}
  api-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage-bucket: student-id-images
  product-storage-bucket: ${SUPABASE_PRODUCT_STORAGE_BUCKET:student-id-images}
